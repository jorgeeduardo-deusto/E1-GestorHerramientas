</head>
<body>

<header>
    <img src="images/logo.png" alt="Logo de la página">

<nav>

</nav>

</header>

    <main>
<section>
<h2> Página principal</h2>
<p>Sección de herramientas que están en uso</p>



<article>
<h3> Registro de nuevo préstamo</h3>
<form action="#" method="POST">
<label for="operario">Nombre del operario:</label>
<input type="text" id="operario" name="operario" required>

<label for="id_herramienta">Id de la herramienta:</label>
<input type="number" id="id_herramienta" name="id_herramienta" required>

<label for="fecha">Fecha de préstamo:</label>
<input type="date" id="fecha" name="fecha" required>

<label for="turno">Turno de trabajo:</label>
<select id="turno" name="turno">

    <option value="mañana">Mañana</option>
    <option value="tarde">Tarde</option>
    <option value="noche">Noche</option>
</select>

<label for="firma">Pin de autorización:</label>
<input type="password" id="firma" name="firma" required>

<label>
    <input type="checkbox" id="normas" name="normas" required>
    Acepto la responsabilidad de la herramienta
</label>

<button type="button" onclick="prestamo()">Registrar el préstamo</button>

</form>
</article>



</section>
<aside>
    <h3>Avisos importantes </h3>
    <p>Es obligatorio usar el equipo de protección</p>
</aside>


    </main>
